<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pupo Parfums - Consultoria Olfativa Exclusiva</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fontes sofisticadas para a identidade visual de luxo -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="control-container">
            <div class="brand-logo">
                <h2>PUPO PARFUMS</h2>
                <p>HAUTE PARFUMERIE</p>
            </div>
            <div id="controles">
                <button id="iniciarBtn" class="gold-btn">Iniciar Experiência</button>
                <button id="limparBtn" class="outline-btn">Limpar Histórico</button>
                <button id="encerrarBtn" class="dark-btn">Encerrar Sessão</button>
            </div>
        </div>

        <div class="chat-container">
            <header class="chat-header">
                <h1>Atelier Virtual</h1>
                <div id="connection-status" class="status-offline">Conectando ao Atelier...</div>
            </header>
            <div id="chat-box" class="chat-box"></div>
            <footer class="chat-input-area">
                <input type="text" id="message-input" placeholder="Descubra sua assinatura olfativa...">
                <button id="send-button">Descobrir</button>
            </footer>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
